<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ test.name }}</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef3fb; margin: 0; padding: 30px; color: #1c2b4a; }
        .wrap { max-width: 900px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 10px 24px rgba(38, 61, 110, 0.08); }
        fieldset { border: 1px solid #d5def0; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        button, .btn { display: inline-block; margin-top: 12px; padding: 10px 14px; border-radius: 10px; text-decoration: none; background: #2457c5; color: white; font-weight: 700; border: none; cursor: pointer; }
        ul { list-style: none; padding-left: 0; }
    </style>
</head>
<body>
    <div class="wrap">
        <p><a class="btn" href="{% url 'tests_index' %}">Volver a tests</a></p>
        <div class="card">
            <h1>{{ test.name }}</h1>
            <p>Tipo: {{ test.get_type_display }} | Duración estimada: {{ test.duration }} minutos</p>

            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <fieldset>
                        <legend><strong>{{ field.label }}</strong></legend>
                        {{ field }}
                        {% if field.errors %}
                            <div>{{ field.errors }}</div>
                        {% endif %}
                    </fieldset>
                {% endfor %}
                <button type="submit">Enviar respuestas</button>
            </form>
        </div>
    </div>
</body>
</html>
