{% extends 'asignaciones/base_asignaciones.html' %}

{% block title %}Crear Asignación{% endblock %}

{% block content %}
<h1>➕ Crear Nueva Asignación</h1>

<form method="post">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="{{ form.titulo.id_for_label }}">Título</label>
        {{ form.titulo }}
    </div>
    
    <div class="form-group">
        <label for="{{ form.descripcion.id_for_label }}">Descripción</label>
        {{ form.descripcion }}
    </div>
    
    <div class="form-group">
        <label for="{{ form.fecha_limite.id_for_label }}">Fecha Límite</label>
        {{ form.fecha_limite }}
    </div>
    
    <button type="submit" class="btn btn-success">Guardar Asignación</button>
    <a href="{% url 'listar_asignaciones' %}" class="btn">Cancelar</a>
</form>
{% endblock %}
