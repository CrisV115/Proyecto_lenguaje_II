<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inducción</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef3fb; margin: 0; padding: 30px; color: #1c2b4a; }
        .wrap { max-width: 760px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 10px 24px rgba(38, 61, 110, 0.08); }
        .btn { display: inline-block; margin-top: 12px; margin-right: 10px; padding: 10px 14px; border-radius: 10px; text-decoration: none; background: #2457c5; color: white; font-weight: 700; border: none; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Inducción</h1>
            <p>Progreso actual: <strong>{{ progress.percentage }}%</strong></p>
            {% if progress.completed %}
                <p>Ya completaste esta fase. Puedes consultar tu certificado.</p>
                <a class="btn" href="{% url 'current_certificate' %}">Ver certificado</a>
            {% else %}
                <p>Completa esta fase para habilitar la certificación.</p>
                <a class="btn" href="{% url 'complete_induction' %}">Completar inducción</a>
            {% endif %}
            <a class="btn" href="{% url 'student_dashboard' %}">Volver al panel</a>
        </div>
    </div>
</body>
</html>
