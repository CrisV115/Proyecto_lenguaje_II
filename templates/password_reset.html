{% extends "base.html" %}

{% block title %}Recuperar contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="glass-card rounded-4 p-4">
            <h1 class="h3 mb-3">Recuperar contraseña</h1>

            {% if not usuario %}
                <form method="post" class="vstack gap-3">
                    {% csrf_token %}
                    <div>
                        <label class="form-label">Correo registrado</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Continuar</button>
                </form>
            {% else %}
                <form method="post" class="vstack gap-3">
                    {% csrf_token %}
                    <input type="hidden" name="email" value="{{ usuario.email }}">
                    <div>
                        <label class="form-label">Pregunta de seguridad</label>
                        <input type="text" class="form-control" value="{{ usuario.get_pregunta_seguridad_display }}" disabled>
                    </div>
                    <div>
                        <label class="form-label">Respuesta</label>
                        <input type="text" name="respuesta_seguridad" class="form-control" required>
                    </div>
                    <div>
                        <label class="form-label">Nueva contraseña</label>
                        <input type="password" name="nueva_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Cambiar contraseña</button>
                </form>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
