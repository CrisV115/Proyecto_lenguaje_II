server {
    listen 80;
    server_name _;

    client_max_body_size 25M;

    location /static/ {
        alias /var/www/proyecto/staticfiles/;
    }

    location /media/ {
        alias /var/www/proyecto/media/;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn-proyecto.sock;
    }
}
